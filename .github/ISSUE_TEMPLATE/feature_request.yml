name: Solicitar función
description: Propone una mejora o nueva capacidad para YomiKomi Tana.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problema o necesidad
      placeholder: ¿Qué intentas hacer y qué parte se siente incómoda o falta?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Solución propuesta
      placeholder: Describe cómo imaginas que debería funcionar.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Conversión EPUB
        - Conversión CBZ
        - Recorte/imágenes
        - Webtoons
        - Interfaz
        - Instalador
        - Documentación
        - Otro
  - type: textarea
    id: notes
    attributes:
      label: Contexto adicional
      description: Agrega capturas, referencias o casos de uso si ayudan.
